<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App (Piped)</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}

input{
  width:80%;
  padding:10px;
  margin:10px;
  font-size:16px;
}

button{
  padding:10px 15px;
  font-size:16px;
  cursor:pointer;
}

.result{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.result:hover{
  background:#222;
}

#player{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  padding:10px;
}
</style>
</head>

<body>

<h2>Music App 🎵</h2>

<input id="searchInput" placeholder="Search music...">
<button onclick="search()">Search</button>

<div id="results"></div>

<div id="player">
  <audio id="audio" controls></audio>
</div>

<script>
const PIPED_INSTANCES = [
  "https://pipedapi.kavin.rocks",
  "https://pipedapi.tokhmi.xyz",
  "https://pipedapi.in.projectsegfau.lt"
];

function showMessage(msg){
  document.getElementById("results").innerHTML = `<p>${msg}</p>`;
}

async function fetchFromAny(urlPath){
  for(const base of PIPED_INSTANCES){
    try{
      const res = await fetch(base + urlPath);
      if(res.ok){
        return await res.json();
      }
    }catch(e){}
  }
  return null;
}

async function search(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return;

  showMessage("Searching...");

  const data = await fetchFromAny(`/search?q=${encodeURIComponent(q)}`);

  if(!data || !data.items || data.items.length === 0){
    showMessage("No results found");
    return;
  }

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  data.items.slice(0, 20).forEach(item=>{
    if(item.type !== "video") return;

    const div = document.createElement("div");
    div.className = "result";
    div.textContent = item.title;

    div.onclick = () => play(item);

    resultsDiv.appendChild(div);
  });
}

async function getAudioStream(id){
  const data = await fetchFromAny(`/streams/${id}`);
  if(!data) return null;

  let stream =
    data.audioStreams?.find(a => a.mimeType.includes("audio")) ||
    data.audioStreams?.[0];

  return stream?.url || null;
}

async function play(track){
  const audio = document.getElementById("audio");

  audio.src = "";
  audio.pause();

  showMessage("Loading audio...");

  const url = await getAudioStream(track.url.split("v=")[1]);

  if(!url){
    showMessage("Failed to load audio");
    return;
  }

  audio.src = url;

  try{
    await audio.play();
  }catch(e){
    alert("Tap play to start audio (iPhone restriction)");
  }

  showMessage(`Now playing: ${track.title}`);
}
</script>

</body>
</html>
